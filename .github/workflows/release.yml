name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write   # required for npm provenance + OIDC publish

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      # Authenticates via npm Trusted Publishing (OIDC). The
      # @networkdiagnostics/sdk package has a trusted publisher
      # config pointing at this repo + workflow filename, so npm
      # exchanges the GH Actions OIDC token for publish access
      # at runtime — no NPM_TOKEN needed.
      - run: npm publish --provenance --access public
