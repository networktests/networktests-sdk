name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write   # required for npm provenance + OIDC publish

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      # First publish uses an NPM_TOKEN (granular, scoped to
      # @networkdiagnostics, bypass-2FA enabled) because trusted
      # publishing can't be pre-configured for a not-yet-existing
      # package on this org. Switch to Trusted Publishing in a
      # follow-up commit once the package exists on npm.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
