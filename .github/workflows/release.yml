name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write   # required for npm provenance + OIDC publish

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      # Authenticates to npm via GitHub OIDC (Trusted Publishing).
      # No NPM_TOKEN secret needed — npm verifies the GH Actions OIDC
      # token against the trusted publisher config for this package.
      - run: npm publish --provenance --access public
