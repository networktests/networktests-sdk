<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>@networktests/sdk — vanilla HTML demo</title>
  <style>
    body { font: 14px/1.4 system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    pre { background: #f4f4f4; padding: 1rem; border-radius: 4px; overflow-x: auto; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>@networktests/sdk — vanilla demo</h1>
  <p>
    Replace <code>SESSION_ENDPOINT</code> below with a URL on your own backend that
    proxies to <code>POST /v1/probe/udp/sessions</code> with your API key.
  </p>
  <button id="run">Run UDP test</button>
  <pre id="out">Click "Run UDP test" to begin.</pre>

  <script src="https://cdn.jsdelivr.net/npm/@networktests/sdk@0/dist/networktests.umd.js"></script>
  <script>
    const SESSION_ENDPOINT = "/my-backend/start-udp";
    const out = document.getElementById("out");
    const nt = new NetworkTests.NetworkTests();

    document.getElementById("run").addEventListener("click", async () => {
      out.textContent = "Requesting session…";
      try {
        const session = await fetch(SESSION_ENDPOINT).then(r => r.json());
        out.textContent = "Test running…";
        const result = await nt.runUdpTest(session, {
          onProgress: (p) => {
            out.textContent = `sent ${p.packetsSent}, received ${p.packetsReceived}, loss ${p.lossPercent}%`;
          },
        });
        out.textContent = JSON.stringify(result, null, 2);
      } catch (err) {
        out.textContent = "Error: " + err.message;
      }
    });
  </script>
</body>
</html>
